name: Tu Dong Build APK Cordova
on:
  push:
    branches: [ "main", "master" ] # Tự động chạy mỗi khi bạn cập nhật code
  workflow_dispatch: # Cho phép bạn bấm nút tự chạy thủ công bất cứ lúc nào

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Ép hệ thống chạy Node 24 theo chuẩn mới nhất
  ANDROID_HOME: /usr/local/lib/android/sdk # Định vị thư mục gốc Android SDK trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Ma Nguon
      uses: actions/checkout@v4

    - name: Cai dat Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cai dat Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Thiet lap bien moi truong he thong Android
      run: |
        # Ép đưa các công cụ ẩn của Android SDK vào danh sách lệnh chạy toàn cục
        echo "${ANDROID_HOME}/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "${ANDROID_HOME}/platform-tools" >> $GITHUB_PATH
        echo "${ANDROID_HOME}/tools/bin" >> $GITHUB_PATH

    - name: Cai dat Apache Cordova CLI va TAY CHAY HOI THOAI
      run: |
        npm install -g cordova
        # 🌟 BÍ KÍP QUAN TRỌNG: Tắt hoàn toàn hộp thoại hỏi ý kiến ngầm để chống sập tiến trình tự động
        cordova telemetry off

    - name: Khoi tao du an va nap du lieu an toan
      run: |
        cordova create temp_app com.pctuyenquang.airgap "AirGapSCADA"
        rm -rf temp_app/www/*
        
        # Sao chép bộ ba file chữ thường của bạn vào lõi ứng dụng APK
        cp index.html temp_app/www/index.html
        cp manifest.json temp_app/www/manifest.json
        cp sw.js temp_app/www/sw.js
        
        # Sao chép file cấu hình quyền nếu có (nếu chưa tạo cũng không gây sập)
        cp config.xml temp_app/config.xml || echo "Sử dụng config.xml mặc định của hệ thống"

    - name: Dong y cac dieu khoan Giay phep Android SDK tinh chinh
      run: |
        # Gọi trực tiếp bằng đường dẫn tuyệt đối để đảm bảo chấp nhận mọi giấy phép biên dịch
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Xay dung nen tang Android va Bien dich APK
      run: |
        cd temp_app
        cordova platform add android@12.0.0
        # Thực hiện biên dịch bản debug tiêu chuẩn cho trạm
        cordova build android --debug

    - name: Xuat file APK thanh pham de tai ve
      uses: actions/upload-artifact@v4
      with:
        name: AirGap_Receiver_PC_TuyenQuang
        path: temp_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
