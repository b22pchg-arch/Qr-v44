name: Tu Dong Build APK Cordova
on:
  push:
    branches: [ "main", "master" ] # Tự động chạy mỗi khi bạn cập nhật code
  workflow_dispatch: # Cho phép bạn bấm nút tự chạy thủ công bất cứ lúc nào

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 🌟 XÓA BỎ CẢNH BÁO: Ép hệ thống chạy Node 24 theo chuẩn năm 2026

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Ma Nguon
      uses: actions/checkout@v4

    - name: Cai dat Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin' # Đổi sang phân phối Temurin tiêu chuẩn ổn định cao cho Android

    - name: Cai dat Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # 🌟 NÂNG CẤP CHÍNH CHẤT: Chạy thẳng Node 24 để dập tắt dòng Warning

    - name: Cai dat Apache Cordova CLI
      run: npm install -g cordova

    - name: Khoi tao du an va nap du lieu an toan
      run: |
        cordova create temp_app com.pctuyenquang.airgap "AirGapSCADA"
        rm -rf temp_app/www/*
        
        # 🌟 CƠ CHẾ CHỐNG SẬP: Sao chép thông minh không sợ sai chữ hoa/thường hoặc thiếu file phụ
        cp index.html temp_app/www/index.html
        cp config.xml temp_app/config.xml || cp Config.xml temp_app/config.xml || echo "Khong tim thay config.xml"
        cp manifest.json temp_app/www/manifest.json || cp Manifest.json temp_app/www/manifest.json || true
        cp sw.js temp_app/www/sw.js || cp SW.js temp_app/www/sw.js || true

    - name: Dong y cac dieu khoan Giay phep Android SDK
      run: |
        yes | sdkmanager --licenses || true

    - name: Xay dung nen tang Android va Bien dich APK
      run: |
        cd temp_app
        cordova platform add android@12.0.0
        # 🌟 TỐI ƯU CỜ LỆNH: Đổi từ --device sang --debug để máy chủ tập trung xuất bản cài đặt dạo nhanh gọn
        cordova build android --debug

    - name: Xuat file APK thanh pham de tai ve
      uses: actions/upload-artifact@v4
      with:
        name: AirGap_Receiver_PC_TuyenQuang
        path: temp_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
