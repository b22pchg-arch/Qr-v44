name: Tu Dong Build APK Cordova
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # 🌟 GIẢI PHÁP CỐT LÕI: Ép chạy trên Ubuntu 22.04 ổn định để dập tắt lỗi xung đột Android SDK
    steps:
    - name: Checkout Ma Nguon
      uses: actions/checkout@v4

    - name: Cai dat Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cai dat Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Cứ dùng Node 20 (Cảnh báo vàng kệ nó, không làm sập hệ thống)

    - name: Cai dat Apache Cordova CLI
      run: |
        npm install -g cordova
        cordova telemetry off

    - name: Khoi tao du an va nap du lieu
      run: |
        cordova create temp_app com.pctuyenquang.airgap "AirGapSCADA"
        rm -rf temp_app/www/*
        
        cp index.html temp_app/www/index.html
        cp manifest.json temp_app/www/manifest.json || true
        cp sw.js temp_app/www/sw.js || true
        cp config.xml temp_app/config.xml || true

    - name: Cai dat Plugin ho tro Camera va Tai File an toan
      run: |
        cd temp_app
        # Tự động nạp Plugin Camera và File để ứng dụng nhận quyền mượt mà không lo báo lỗi
        cordova plugin add cordova-plugin-camera
        cordova plugin add cordova-plugin-file

    - name: Xay dung nen tang Android va Bien dich APK
      run: |
        cd temp_app
        # Dùng nền tảng Android 13 mới nhất tương thích tốt với Java 17
        cordova platform add android@13.0.0
        # Thêm biến --verbose để hệ thống báo cáo chi tiết nếu có bất kỳ cảnh báo nào
        cordova build android --debug --verbose 

    - name: Xuat file APK thanh pham de tai ve
      uses: actions/upload-artifact@v4
      with:
        name: AirGap_Receiver_PC_TuyenQuang
        path: temp_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
